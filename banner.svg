<svg width="1200" height="280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Subtle radial glow behind icon -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0A192F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="#0A192F"/>

  <!-- Subtle dot grid -->
  <g opacity="0.12" fill="#00FFFF">
    <!-- Row 1 -->
    <circle cx="30"  cy="30"  r="1.2"/><circle cx="70"  cy="30"  r="1.2"/>
    <circle cx="30"  cy="70"  r="1.2"/><circle cx="70"  cy="70"  r="1.2"/>
    <circle cx="30"  cy="250" r="1.2"/><circle cx="70"  cy="250" r="1.2"/>
    <circle cx="30"  cy="210" r="1.2"/><circle cx="70"  cy="210" r="1.2"/>
    <!-- Right side -->
    <circle cx="1130" cy="30"  r="1.2"/><circle cx="1170" cy="30"  r="1.2"/>
    <circle cx="1130" cy="70"  r="1.2"/><circle cx="1170" cy="70"  r="1.2"/>
    <circle cx="1130" cy="250" r="1.2"/><circle cx="1170" cy="250" r="1.2"/>
    <circle cx="1130" cy="210" r="1.2"/><circle cx="1170" cy="210" r="1.2"/>
  </g>

  <!-- Glow behind icon -->
  <ellipse cx="155" cy="145" rx="120" ry="110" fill="url(#glow)"/>

  <!-- ── Geometric lock icon ─────────────────────────────────── -->
  <!-- Outer shield -->
  <polygon
    points="105,72 205,72 222,148 195,208 155,232 115,208 88,148"
    fill="none" stroke="#00FFFF" stroke-width="2.2" stroke-linejoin="miter"/>

  <!-- Inner shield (inset) -->
  <polygon
    points="116,85 194,85 208,148 186,198 155,217 124,198 102,148"
    fill="none" stroke="#00FFFF" stroke-width="0.8" opacity="0.35"/>

  <!-- Lock shackle (angular U — geometric style) -->
  <polyline
    points="133,143 133,106 177,106 177,143"
    fill="none" stroke="#00FFFF" stroke-width="2.5"
    stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Lock body -->
  <rect x="120" y="143" width="70" height="52"
    fill="#0A192F" stroke="#00FFFF" stroke-width="2.2"/>

  <!-- Keyhole circle -->
  <circle cx="155" cy="162" r="7.5"
    fill="none" stroke="#00FFFF" stroke-width="2"/>

  <!-- Keyhole slot -->
  <rect x="151.5" y="168" width="7" height="14"
    fill="none" stroke="#00FFFF" stroke-width="2"/>

  <!-- ── Vertical divider ───────────────────────────────────── -->
  <line x1="300" y1="52" x2="300" y2="228"
    stroke="#00FFFF" stroke-width="0.8" opacity="0.4"/>

  <!-- ── Text ──────────────────────────────────────────────── -->
  <!-- "SSH / TLS" -->
  <text x="348" y="128"
    font-family="'Montserrat','Arial Black',sans-serif"
    font-weight="900" font-size="58" letter-spacing="8"
    fill="#F5F5F5">SSH / TLS</text>

  <!-- "AUDITOR" in cyan -->
  <text x="348" y="196"
    font-family="'Montserrat','Arial Black',sans-serif"
    font-weight="900" font-size="68" letter-spacing="12"
    fill="#00FFFF">AUDITOR</text>

  <!-- Separator line under title -->
  <line x1="348" y1="214" x2="880" y2="214"
    stroke="#00FFFF" stroke-width="0.8" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="350" y="240"
    font-family="'Inter','Arial',sans-serif"
    font-weight="400" font-size="14" letter-spacing="4"
    fill="#8892a4">SECURITY AUDIT TOOL · PURE PYTHON · NO EXTERNAL DEPENDENCIES</text>

</svg>